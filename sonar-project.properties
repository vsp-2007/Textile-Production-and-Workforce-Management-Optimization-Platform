# SonarQube Configuration for TexWorkforce Optimizer

sonar.projectKey=texworkforce-optimizer
sonar.organization=vsp-2007
sonar.projectName=TexWorkforce Optimizer
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/migrations/**,**/dist/**,**/build/**,**/*.min.js,**/coverage/**,**/.git/**

# Test exclusions
sonar.test.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/migrations/**,**/dist/**,**/build/**

# Python coverage
sonar.python.coverage.reportPaths=backend/coverage.xml

# JavaScript/TypeScript coverage
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Quality Gates
sonar.qualitygate.wait=true

# Source encoding
sonar.sourceEncoding=UTF-8

# Python specific
sonar.python.version=3.11

# File suffixes
sonar.python.file.suffixes=.py
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx