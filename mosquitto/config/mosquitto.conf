# Mosquitto Configuration for TexWorkforce Optimizer

# Listener
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket listener for browser clients
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# Security
# For development, we allow anonymous access
# In production, configure proper authentication
# password_file /mosquitto/config/passwords
# allow_anonymous false

# Message size limits
message_size_limit 1048576

# Connection limits
max_connections -1
max_inflight_messages 100
max_queued_messages 1000

# Retained messages
retain_available true

# Will delay (seconds)
will_delay_interval 30

# MQTT v5 options
mqtt_v5 true

# Bridge configuration (if needed for clustering)
# connection bridge-name
# address broker.hivemq.com:1883
# topic # both 0 texworkforce/