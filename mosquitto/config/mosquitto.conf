# Mosquitto Configuration for TexWorkforce Optimizer

# Listener for MQTT (standard port)
listener 1883
protocol mqtt

# Listener for WebSockets (for browser clients)
listener 9001
protocol websockets

# Allow anonymous connections (for development)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# Connection limits
max_connections 1000
max_keepalive 65535

# Message limits
message_size_limit 1048576
max_inflight_messages 100
max_queued_messages 1000

# Bridge (for connecting to external brokers if needed)
# connection external-broker
# address external.broker.com:1883
# topic texworkforce/# both 0

# Websockets specific
# http_dir /mosquitto/http