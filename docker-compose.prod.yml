version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: texworkforce-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: texworkforce
      MYSQL_USER: texworkforce
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - texworkforce-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: texworkforce-mqtt-prod
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - texworkforce-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: texworkforce-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - texworkforce-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: texworkforce-backend-prod
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://texworkforce:${MYSQL_PASSWORD}@mysql:3306/texworkforce
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_COOKIE_SECURE=True
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMS_GATEWAY_URL=${SMS_GATEWAY_URL}
      - SMS_GATEWAY_KEY=${SMS_GATEWAY_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - texworkforce-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: texworkforce-celery-prod
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://texworkforce:${MYSQL_PASSWORD}@mysql:3306/texworkforce
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    command: celery -A app.celery worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - mysql
    networks:
      - texworkforce-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: texworkforce-celery-beat-prod
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://texworkforce:${MYSQL_PASSWORD}@mysql:3306/texworkforce
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    command: celery -A app.celery beat --loglevel=info
    depends_on:
      - redis
      - mysql
    networks:
      - texworkforce-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: texworkforce-frontend-prod
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend
    networks:
      - texworkforce-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:alpine
    container_name: texworkforce-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - texworkforce-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure

networks:
  texworkforce-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: